schema_version: 1

context:
  name: 7zip
  version: "26.01"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/ip7z/7zip/archive/${{ version }}.tar.gz
  sha256: f4212b508641b3584f7089ab67bc0aba028c631f049b4dd603ff07853e72e749

build:
  number: 0

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - if: not win
      then:
        - make
    - if: osx
      then:
        - uutils-coreutils
  run_constraints:
    - 7za ==999999999

tests:
  - script:
      - 7z
      - 7za
      - 7zr
      - 7zz

about:
  license: LGPL-2.1-or-later AND LicenseRef-LGPL-2.1-or-later-with-unRAR-restriction
  license_file:
    - LICENSE.txt
    - UNRAR_LICENSE.txt
  summary: 7-Zip is a file archiver with a high compression ratio.
  homepage: https://www.7-zip.org/
  repository: https://github.com/ip7z/7zip

extra:
  recipe-maintainers:
    - XhstormR
    - wolfv
